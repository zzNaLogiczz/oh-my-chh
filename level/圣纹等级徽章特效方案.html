ba(255,255,255,.7), inset 0 -3px 6px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.08);\n}\n.t-envoy .disc,.t-spirit .disc,.t-king .disc{\n  box-shadow:inset 0 1px 2px rgba(255,255,255,.18), inset 0 -3px 8px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.06);\n}\n.crest{ position:relative; z-index:3; width:30px; height:30px; display:grid; place-items:center; }\n.crest svg{ width:30px; height:30px; overflow:visible; display:block; }\n.ico-stroke{ stroke:var(--c2); fill:none; }\n.ico-fill{ fill:var(--c2); }\n.ico-core{ fill:var(--c1); }\n.ico-deep{ fill:var(--c3); }\n.bname{ position:relative; z-index:3; }\n\n/* ============================================================\n   FX LAYERS\n   ============================================================ */\n\n/* aura: breathing radial halo behind crest */\n.fx-aura .disc::after{\n  content:\"\"; position:absolute; inset:-7px; border-radius:50%; z-index:-1;\n  background:radial-gradient(circle, var(--glow) 0%, transparent 68%);\n  animation:b-aura 3s ease-in-out infinite;\n}\n@keyframes b-aura{ 0%,100%{ opacity:.45; transform:scale(.92);} 50%{ opacity:.95; transform:scale(1.08);} }\n\n/* crest glow */\n.fx-glow .crest svg{ filter:drop-shadow(0 0 4px var(--glow)); }\n.fx-glow2 .crest svg{ filter:drop-shadow(0 0 7px var(--glow)) drop-shadow(0 0 2px var(--c1)); }\n\n/* float bob */\n@keyframes float{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-2px);} }\n.fx-float .crest{ animation:float 3.2s ease-in-out infinite; }\n\n/* plate shine sweep */\n.fx-sweep::after{\n  content:\"\"; position:absolute; inset:0; border-radius:inherit; z-index:4; pointer-events:none;\n  background:linear-gradient(105deg,transparent 32%,rgba(255,255,255,.5) 48%,transparent 64%);\n  background-size:240% 100%; background-position:150% 0;\n  animation:sweep 4s ease-in-out infinite; mix-blend-mode:screen;\n}\n@keyframes sweep{ 0%{ background-position:150% 0;} 55%,100%{ background-position:-70% 0;} }\n\n/* runic ring — fine ticks, rotating */\n.ring  225deg, var(--glow) 229deg, transparent 234deg,\n            transparent 270deg, var(--glow) 274deg, transparent 279deg,\n            transparent 315deg, var(--glow) 319deg, transparent 324deg, transparent 360deg);\n  -webkit-mask:radial-gradient(circle, #000 0 16px, transparent 28px);\n          mask:radial-gradient(circle, #000 0 16px, transparent 28px);\n  opacity:.5; animation:spin 18s linear infinite;\n}\n\n/* prismatic aurora glow (admin) */\n.aurora{ position:absolute; inset:-4px; border-radius:50%; z-index:-2; pointer-events:none;\n  background:conic-gradient(from 0deg,#f0b22e,#e0433f,#a259e6,#3b82f6,#2bd4a8,#f0b22e);\n  filter:blur(9px); opacity:.6; animation:spin 7s linear infinite; }\n\n/* orbiting light dots */\n.orb{ position:absolute; width:4px; height:4px; border-radius:50%; top:50%; left:50%; margin:-2px; z-index:2;\n  background:radial-gradient(circle,#fff,var(--c1)); box-shadow:0 0 6px var(--c1); pointer-events:none; }\n.fx-orbit .orb{ animation:orbit 4.4s linear infinite; }\n.fx-orbit .orb:nth-of-type(2){ animation-delay:-1.1s; }\n.fx-orbit .orb:nth-of-type(3){ animation-delay:-2.2s; }\n.fx-orbit .orb:nth-of-type(4){ animation-delay:-3.3s; }\n@keyframes orbit{\n  from{ transform:rotate(0deg) translateX(21px) rotate(0deg); opacity:.2; }\n  50%{ opacity:1; }\n  to{ transform:rotate(360deg) translateX(21px) rotate(-360deg); opacity:.2; }\n}\n\n/* rising ember sparks */\n.spk{ position:absolute; bottom:8px; width:3px; height:3px; border-radius:50%; z-index:2;\n  background:radial-gradient(circle,#fff,var(--c2)); box-shadow:0 0 5px var(--glow); opacity:0; pointer-events:none; }\n.spk:nth-of-type(odd){ background:radial-gradient(circle,#fff,var(--c1)); }\n.fx-spark .spk:nth-of-type(1){ left:20%; animation:rise 2.4s ease-in infinite; }\n.fx-spark .spk:nth-of-type(2){ left:42%; animation:rise 2.9s ease-in .5s infinite; }\n.fx-spark .spk:nth-of-type(3){ left:62%; animation:rise 2.2s ease-in 1s infinite; }\n.fx-spark .spk:nth-of-type(4){ left:80%; animation:rise 3.1s ease-in 1.5s infinite; }\n@keyframes rise{ 0%{opacity:0; transform:translateY(0) scale(.5);} 16%{opacity:1;} 100%{opacity:0; transform:translateY(-30px) scale(1.1);} }\n\n/* shared spins */\n@keyframes spin{ to{ transform:rotate(360deg);} }\n@keyframes spin-rev{ to{ transform:rotate(-360deg);} }\n\n/* ============================================================\n   KING — detailed multi-ring rotating outer\n   ============================================================ */\n.king-rings{ position:absolute; inset:-10px; z-index:0; pointer-events:none; }\n.king-rings .kr{ position:absolute; inset:0; border-radius:50%; }\n.kr1{ /* fine tick ring */\n  background:repeating-conic-gradient(from 0deg, var(--c2) 0deg .8deg, transparent .8deg 4deg);\n  -webkit-mask:radial-gradient(circle, transparent 0 27px, #000 27px 29px, transparent 29.5px);\n          mask:radial-gradient(circle, transparent 0 27px, #000 27px 29px, transparent 29.5px);\n  opacity:.85; animation:spin 16s linear infinite; filter:drop-shadow(0 0 2px var(--glow));\n}\n.kr2{ /* rune dashes counter-rotating */\n  background:repeating-conic-gradient(from 0deg, var(--c1) 0deg 2.4deg, transparent 2.4deg 22.5deg);\n  -webkit-mask:radial-gradient(circle, transparent 0 23px, #000 23px 26px, transparent 26.5px);\n          mask:radial-gradient(circle, transparent 0 23px, #000 23px 26px, transparent 26.5px);\n  opacity:.8; animation:spin-rev 12s linear infinite;\n}\n.kr3{ /* inner thin ring slow */\n  background:conic-gradient(from 0deg, transparent, var(--c2), transparent, var(--c2), transparent);\n  -webkit-mask:radial-gradient(circle, transparent 0 20px, #000 20px 21px, transparent 21.5px);\n          mask:radial-gradient(circle, transparent 0 20px, #000 20px 21px, transparent 21.5px);\n  opacity:.7; animation:spin 22s linear infinite;\n}\n.kr4{ /* four cardinal gem ornaments */\n  background:\n    radial-gradient(circle 3px at 50% 0,   var(--c1) 55%, transparent 60%),\n    radial-gradient(circle 3px at 50% 100%, var(--c1) 55%, transparent 60%),\n    radial-gradient(circle 3px at 0 50%,    var(--c1) 55%, transparent 60%),\n    radial-gradient(circle 3px at 100% 50%, var(--c1) 55%, transparent 60%);\n  filter:drop-shadow(0 0 4px var(--glow)); animation:spin-rev 20s linear infinite;\n}\n\n/* ---- reduced motion ---- */\n@media (prefers-reduced-motion:reduce){\n  .fx-aura .disc::after,.fx-float .crest,.fx-sweep::after,.ring,.ring2,.ring3,.beam,\n  .aurora,.fx-orbit .orb,.spk,.king-rings .kr{ animation:none; }\n}\n<\u002Fstyle>\n<style>\n  *{ box-sizing:border-box; margin:0; padding:0; }\n  body{ font-family:\"PingFang SC\",\"Hiragino Sans GB\",-apple-system,system-ui,sans-serif;\n    background:radial-gradient(1200px 600px at 50% -10%, #f2f5fb 0%, transparent 60%), #e7ebf2;\n    color:#1c2230; -webkit-font-smoothing:antialiased; padding:56px 24px 90px; }\n  .wrap{ max-width:1180px; margin:0 auto; }\n  .lead{ text-align:center; margin-bottom:42px; }\n  .kicker{ font-size:13px; letter-spacing:3px; color:#8a94a6; font-weight:600; }\n  h1{ font-size:32px; font-weight:800; letter-spacing:.5px; margin:10px 0 12px; }\n  .sub{ font-size:15px; color:#6a7488; max-width:660px; margin:0 auto; line-height:1.7; }\n\n  .shead{ display:flex; align-items:baseline; gap:14px; margin:50px 0 6px; }\n  .shead h2{ font-size:21px; font-weight:800; }\n  .shead .en{ font-size:12.5px; color:#9aa3b5; font-weight:600; letter-spacing:1px; }\n  .sdesc{ font-size:13.5px; color:#6a7488; line-height:1.65; max-width:780px; margin-bottom:24px; }\n\n  .grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }\n  .spec{ background:#fff; border:1px solid rgba(120,140,170,.14); border-radius:20px;\n    padding:30px 18px 18px; text-align:center; box-shadow:0 1px 3px rgba(20,30,50,.05);\n    display:flex; flex-direction:column; align-items:center; }\n  .stage{ min-height:64px; display:grid; place-items:center; margin-bottom:18px; }\n  .slabel{ font-size:15px; font-weight:700; color:#2a3242; }\n  .s :880px){ .grid{ grid-template-columns:1fr 1fr; } .otherband{ grid-template-columns:1fr; } }\n  @media (max-width:560px){ .grid{ grid-template-columns:1fr; } }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"wrap\">\n\n  <div class=\"lead\">\n    <div class=\"kicker\">DIRECTION B · 圣纹<\u002Fdiv>\n    <h1>圣纹 · 纹章特效（细化版）<\u002Fh1>\n    <p class=\"sub\">每一级都加厚了特效：奖章底盘 + 呼吸光晕，随阶位叠加旋转符文环、放射圣光、轨道光点与上升火星。圣魔王配多层精细旋转外环。纯 CSS/SVG。<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- ============ NORMAL LADDER ============ -->\n  <section>\n    <div class=\"shead\"><h2>普通等级阶梯 · 完整 11 阶<\u002Fh2><span class=\"en\">亡灵 → 炽天使 · 越高越华丽<\u002Fspan><\u002Fdiv>\n    <p class=\"sdesc\">幽魂 → 光环初现 → 羽翼渐丰 → 权杖 → 圣盾 → 辉耀 → 巨翼 → 御座火轮 → 四翼智晶 → 炎之六翼。每阶换不同纹章，光晕、符文环、圣光、粒子逐级点亮。<\u002Fp>\n    <div class=\"grid\">\n\n      <!-- 亡灵 -->\n      <div class=\"spec\">\n        <div class=\"stage\"><span class=\"hb t-undead fx-aura fx-float fx-glow\"><span class=\"emblem\"><span class=\"disc\"><\u002Fspan><span class=\"crest\">\n          <svg viewBox=\"0 0 30 30\"><path class=\"ico-fill\" d=\"M15 4c-4.2 0-7.2 3.4-7.2 8.4 0 3.7 1.3 6.5 1.3 8.6 0 1-.9 1.6-.9 2.7 0 .9.9 1.5 1.7 1 .7-.4 1.1-.4 1.7 0 .7.5 1.5.5 2.2 0 .6-.4 1-.4 1.7 0 .8.5 1.7-.1 1.7-1 0-1.1-.9-1.7-.9-2.7 0-2.1 1.3-4.9 1.3-8.6C22.2 7.4 19.2 4 15 4Z\" opacity=\".9\"><\u002Fpath><circle class=\"ico-core\" cx=\"11.8\" cy=\"12.5\" r=\"1.7\"><\u002Fcircle><circle class=\"ico-core\" cx=\"18.2\" cy=\"12.5\" r=\"1.7\"><\u002Fcircle><circle class=\"ico-deep\" cx=\"11.8\" cy=\"12.7\" r=\".7\"><\u002Fcircle><circle class=\"ico-deep\" cx=\"18.2\" cy=\"12.7\" r=\".7\"><\u002Fcircle><\u002Fsvg>\n        <\u002Fspan><\u002Fspan><span class=\"bname\">亡灵<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"slabel\">亡灵<\u002Fdiv><div class=\"stier\">T0 · 幽蓝<\u002Fdiv>\n        <div class=\"rar\"><i class=\"on\"><\u002Fi><i><\u002Fi><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n        <div class=\"snote\">幽魂飘忽 · 冷蓝光晕 + 浮动<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 实习天
